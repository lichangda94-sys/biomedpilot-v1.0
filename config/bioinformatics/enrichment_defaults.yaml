schema_version: 1
source_docs:
  parameter_inventory: docs/bioinformatics_original_code_parameter_inventory.md
  schema_draft: docs/bioinformatics_software_parameter_schema_draft.md

gene_id_mapping:
  package: clusterProfiler
  annotation_package: org.Hs.eg.db
  from_types: [SYMBOL, ENSEMBL, ENTREZ]
  to_type: ENTREZID
  minimum_mapping_rate: 0.5

universe:
  default: mapped_expressed_genes
  allow_custom_universe: true
  warning: Enrichment universe/background uses mapped expressed genes by default unless user provides a custom universe.

go:
  enabled: true
  package: clusterProfiler
  function: enrichGO
  organism_database: org.Hs.eg.db
  ontology: BP
  p_adjust_method: BH
  pvalue_cutoff: 0.05
  qvalue_cutoff: 0.2
  readable: true

kegg:
  enabled: true
  package: clusterProfiler
  function: enrichKEGG
  organism: hsa
  p_adjust_method: BH
  pvalue_cutoff: 0.05
  qvalue_cutoff: 0.2

gsea:
  enabled: true
  package: clusterProfiler
  functions: [gseGO, gseKEGG]
  ranking_metrics: [logFC, log2FoldChange, correlation]
  decreasing: true
  key_type: ENTREZID
  ontology: BP
  organism: hsa
  p_adjust_method: BH
  min_gene_set_size: 10
  max_gene_set_size: 500
  pvalue_cutoff: 0.5
  exploratory_pvalue_cutoff: 1
  term_selection_modes: [top_n, keyword, all_significant]
  default_top_n: 10
  keyword_filters_are_project_specific: true

deg_filters_for_enrichment:
  strict:
    logfc_abs_cutoff: 1
    adjusted_p_value_cutoff: 0.05
  relaxed_directional:
    logfc_abs_cutoff: 0.5
    adjusted_p_value_cutoff: 0.05

output:
  go_table_template: "{analysis_id}_GO_BP_enrichment.csv"
  kegg_table_template: "{analysis_id}_KEGG_enrichment.csv"
  gsea_table_template: "{analysis_id}_GSEA_results.csv"
  gsea_object_template: "{analysis_id}_GSEA_object.rds"
  dotplot_template: "{analysis_id}_{source}_{direction}_dotplot.png"
  gsea_plot_template: "GSEA_{keyword}_{index}_{safe_description}.png"

b10_1_ora_gate:
  status: gate_only_no_execution
  allowed_sources:
    - formal_computed_result_deg
    - imported_external_result_deg
  forbidden_sources:
    - raw_expression
    - preflight_only
    - testing_level
    - exploratory
    - dry_run
  resource_policy:
    local_gmt: true
    project_registry: true
    online_download: false
  methods_allowed_for_future_execution:
    - hypergeometric
    - fisher_exact
  multiple_testing_policy: BH
  report_ready_eligible: false

b10_2_controlled_ora_execution:
  status: controlled_ora_mvp_enabled
  source_policy: result_index_deg_only
  methods:
    - hypergeometric
    - fisher_exact
  dependency_policy:
    required:
      - scipy
      - statsmodels
    install_action: none_detect_first_only
  outputs:
    result_table: true
    result_index_v2: true
    task_run_log: true
    plot_artifacts: false
    report_artifacts: false
    report_ready_eligible: false
  disabled_capabilities:
    - GSEA
    - ORA_plot
    - report_ready_ORA_section
    - survival
    - clinical_interpretation

b11_1_gsea_preranked_gate:
  status: gate_only_no_execution
  allowed_sources:
    - formal_computed_result_deg
    - imported_external_result_deg
  forbidden_sources:
    - raw_expression
    - ora_result
    - preflight_only
    - testing_level
    - exploratory
    - dry_run
    - developer_preview
  rank_metrics:
    - signed_log10_fdr_by_log2fc
    - signed_log10_pvalue_by_log2fc
    - log2_fold_change
    - statistic
    - custom_rank_column
  default_rank_metric: signed_log10_fdr_by_log2fc
  duplicate_gene_policy: keep_max_abs_rank
  resource_policy:
    local_gmt: true
    project_registry: true
    online_download: false
    msigdb_requires_manual_license_acknowledgement: true
  future_execution:
    enabled: false
    requires_stage: B11.2
  outputs:
    ranked_gene_list: true
    gsea_result_table: false
    gsea_plot: false
    report_ready_gsea_section: false
  disabled_capabilities:
    - GSEA_execution
    - GSEA_plot
    - GSEA_report_ready
    - survival
    - clinical_interpretation
